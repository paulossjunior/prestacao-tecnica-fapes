services:
  - type: web
    name: prestacao-tecnica-fapes
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # timeout alto + threads: no free tier a análise pode levar vários minutos.
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 600
    envVars:
      - key: MISTRAL_API_KEY
        sync: false            # definir manualmente no dashboard (secret)
      - key: MISTRAL_MODEL
        value: mistral-large-latest
      - key: PYTHON_VERSION
        value: "3.12.8"
